<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            display: grid;
            column-gap: 0.5%;
            row-gap: 1%;
        }
        .o1{
            background-color: orange;
        }
        .o2{
            background-color: orange;
        }
        .l{
            background-color: yellowgreen;
        }
        .b1{
            background-color: blue;
        }
        .b2{
            background-color: blue;
        }
        .b3{
            background-color: blue;
        }
        .g1{
            background-color: gray;
        }
        .g2{
            background-color: gray;
        }
        .g3{
            background-color: gray;
        }
        .g4{
            background-color: gray;
        }
        @media (max-width: 320px){
            .container{
                grid-template-columns: 100vw;
                grid-template-rows: 5vh 5vh 5vh 15vh 15vh 15vh 5vh 5vh 5vh 5vh;
            }
            .o1{
                grid-row: 1;
                grid-column: 1;
            }
            .o2{
                grid-row: 2;
                grid-column: 1;
            }
            .l{
                grid-row: 3;
                grid-column: 1;
            }
            .b1{
                grid-row: 4;
                grid-column: 1;
            }
            .b2{
                grid-row: 5;
                grid-column: 1;
            }
            .b3{
                grid-row: 6;
                grid-column: 1;
            }
            .g1{
                grid-row: 7;
                grid-column: 1;
            }
            .g2{
                grid-row: 8;
                grid-column: 1;
            }
            .g3{
                grid-row: 9;
                grid-column: 1;
            }
            .g4{
                grid-row: 10;
                grid-column: 1;
            }
        }
        @media (min-width: 321px) and (max-width: 768px){
            .container{
                grid-template-columns: 50vw 50vw;
                grid-template-rows: 5vh 5vh 20vh 10vh 10vh 10vh 10vh 10vh;
            }
            .o1{
                grid-row: 1;
                grid-column: 1;
                width: 100vw;
            }
            .o2{
                grid-row: 2;
                grid-column: 1;
                width: 100vw;
            }
            .l{
                grid-row: 3;
                grid-column: 1;
                width: 100vw;
            }
            .b1{
                grid-row: 4;
                grid-column: 1;
                width: 100vw;
            }
            .b2{
                grid-row: 5;
                grid-column: 1;
                width: 100vw;
            }
            .b3{
                grid-row: 6;
                grid-column: 1;
                width: 100vw;
            }
            .g1{
                grid-row: 7;
                grid-column: 1;
            }
            .g2{
                grid-row: 7;
                grid-column: 2;
            }
            .g3{
                grid-row: 8;
                grid-column: 1;
            }
            .g4{
                grid-row: 8;
                grid-column: 2;
            }
        }
        @media (min-width: 769px){
            .container{
                grid-template-columns: 8.3vw 8.3vw 8.3vw 8.3vw 8.3vw 8.3vw 8.3vw 8.3vw 8.3vw 8.3vw 8.3vw 8.3vw;
                grid-template-rows: 10vh 50vh 25vh 15vh;
            }
            .o1{
                grid-row: 1;
                grid-column: 1;
                width: 50vw;
            }
            .o2{
                grid-row: 1;
                grid-column: 7;
                width: 50vw;
            }
            .l{
                grid-row: 2;
                grid-column: 1;
                width: 100vw;
            }
            .b1{
                grid-row: 3;
                grid-column: 1;
                width: 33vw;
            }
            .b2{
                grid-row: 3;
                grid-column: 5;
                width: 33vw;
            }
            .b3{
                grid-row: 3;
                grid-column: 9;
                width: 33vw;
            }
            .g1{
                grid-row: 4;
                grid-column: 1;
                width: 25vw;
            }
            .g2{
                grid-row: 4;
                grid-column: 4;
                width: 25vw;
            }
            .g3{
                grid-row: 4;
                grid-column: 7;
                width: 25vw;
            }
            .g4{
                grid-row: 4;
                grid-column: 10;
                width: 25vw;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="o1"></div>
        <div class="o2"></div>
        <div class="l"></div>
        <div class="b1"></div>
        <div class="b2"></div>
        <div class="b3"></div>
        <div class="g1"></div>
        <div class="g2"></div>
        <div class="g3"></div>
        <div class="g4"></div>
    </div>
</body>
</html>
