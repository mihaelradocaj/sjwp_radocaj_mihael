<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            display: grid;
        }
        .r{
            background-color: red;
        }
        .y{
            background-color: yellow;
        }
        .w{
            background-color: white;
        }
        .g{
            background-color: green;
        }
        .b{
            background-color: blue;
        }
        @media (max-width: 480px){
            .container{
                grid-template-columns: 100vw;
                grid-template-rows: 20vh 20vh 20vh 20vh 20vh;
            }
            .r{
                grid-row: 1;
                grid-column: 1;
            }
            .w{
                grid-row: 2;
                grid-column: 1;
            }
            .y{
                grid-row: 3;
                grid-column: 1;
            }
            .g{
                grid-row: 4;
                grid-column: 1;
            }
            .b{
                grid-row: 5;
                grid-column: 1;
            }
        }
        @media (min-width: 481px) and (max-width: 768px){
            .container{
                grid-template-columns: 50vw 50vw;
                grid-template-rows: 10vh 40vh 40vh 10vh;
            }
            .r{
                grid-row: 1;
                grid-column: 1;
                width: 100vw;
            }
            .w{
                grid-row: 2;
                grid-column: 1;
                width: 100vw;
            }
            .y{
                grid-row: 3;
                grid-column: 1;
            }
            .g{
                grid-row: 3;
                grid-column: 2;
            }
            .b{
                grid-row: 4;
                grid-column: 1;
                width: 100vw;
            }
        }
        @media (min-width: 769px){
            .container{
                grid-template-columns: 25vw 50vw 25vw;
                grid-template-rows: 10vh 80vh 10vh;
            }
            .r{
                grid-row: 1;
                grid-column: 1;
                width: 100vw;
            }
            .y{
                grid-row: 2;
                grid-column: 1;
            }
            .w{
                grid-row: 2;
                grid-column: 2;
            }
            .g{
                grid-row: 2;
                grid-column: 3;
            }
            .b{
                grid-row: 3;
                grid-column: 1;
                width: 100vw;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="r"></div>
        <div class="y"></div>
        <div class="w"></div>
        <div class="g"></div>
        <div class="b"></div>
    </div>
</body>
</html>
